services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: exammind
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tutor_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor -d exammind"]
      interval: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "8000:8000"
      - "3000:3000"
    env_file: .env
    environment:
      - DB_URI=postgresql://tutor:${POSTGRES_PASSWORD:-tutor_dev}@postgres:5432/exammind
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma_store
      - ./data:/app/data

  jaeger:
    image: jaegertracing/jaeger:2
    ports:
      - "16686:16686"
      - "4317:4317"
    profiles:
      - observability

volumes:
  pgdata:
  chroma_data:
